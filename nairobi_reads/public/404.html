<!DOCTYPE html>
<html>
<head>
  <title>Page Not Found (404) - Nairobi Reads</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 50px 20px; margin: 0; }

    img { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; }
    a { display: inline-block; padding: 12px 24px; background-color: #d94a38; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/404_image.png" alt="404 Error">
    <h1 style="margin: 0 0 10px 0; font-size: 2rem;">Oops! Page Not Found.</h1>

    <a href="/">Return to Bookshelf</a>

</html>
